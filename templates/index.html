<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWave Autonomous Support</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="orb"></div>
                <h1>ShopWave AI Agent</h1>
            </div>
            <button id="deploy-agent-btn" class="glow-on-hover">Deploy Autonomous Agent</button>
        </header>

        <main>
            <section class="glass-panel summary-panel">
                <div class="stat-box">
                    <h3>Active Tickets</h3>
                    <p id="total-tickets">0</p>
                </div>
                <div class="stat-box">
                    <h3>Resolved</h3>
                    <p id="resolved-tickets">0</p>
                </div>
                <div class="stat-box">
                    <h3>Escalated</h3>
                    <p id="escalated-tickets">0</p>
                </div>
            </section>

            <section class="logs-section">
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: start;">
                    <div style="flex: 1;" class="glass-panel" style="padding: 1rem;">
                        <h2 style="padding: 1rem 1rem 0;">Submit New Ticket</h2>
                        <div style="padding: 1rem; display: flex; flex-direction: column; gap: 10px;">
                            <input type="text" id="new-t-email" placeholder="Customer Email" style="padding: 8px; border-radius: 4px; border: none; background: rgba(0,0,0,0.2); color: #fff;">
                            <input type="text" id="new-t-subject" placeholder="Ticket Subject" style="padding: 8px; border-radius: 4px; border: none; background: rgba(0,0,0,0.2); color: #fff;">
                            <textarea id="new-t-body" placeholder="Describe the issue..." style="padding: 8px; border-radius: 4px; border: none; background: rgba(0,0,0,0.2); color: #fff; resize: vertical; min-height: 60px;"></textarea>
                            <button id="submit-ticket-btn" class="glow-on-hover" style="align-self: flex-start; padding: 6px 12px; font-size: 0.9rem;">Submit Ticket</button>
                        </div>
                    </div>
                    
                    <div style="flex: 2;">
                        <h2>Module Telemetry</h2>
                        <div class="tab-buttons" style="display:flex; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2);">
                            <button class="tab-btn active" data-target="active-queue">Active Queue</button>
                            <button class="tab-btn" data-target="resolved-queue">Resolved</button>
                            <button class="tab-btn" data-target="escalated-queue">Escalated</button>
                        </div>
                        <div id="active-queue" class="tab-content active glass-panel logs-container">
                            <div class="empty-state">No Active Tickets.</div>
                        </div>
                        <div id="resolved-queue" class="tab-content glass-panel logs-container" style="display: none;">
                            <div class="empty-state">Agent awaiting deployment...</div>
                        </div>
                        <div id="escalated-queue" class="tab-content glass-panel logs-container" style="display: none;">
                            <div class="empty-state">Agent awaiting deployment...</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
