<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWave Autonomous Support</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="orb"></div>
                <h1>ShopWave AI Agent</h1>
            </div>
            <button id="deploy-agent-btn" class="glow-on-hover">Deploy Autonomous Agent</button>
        </header>

        <main>
            <section class="glass-panel summary-panel">
                <div class="stat-box">
                    <h3>Active Tickets</h3>
                    <p id="total-tickets">0</p>
                </div>
                <div class="stat-box">
                    <h3>Resolved</h3>
                    <p id="resolved-tickets">0</p>
                </div>
                <div class="stat-box">
                    <h3>Escalated</h3>
                    <p id="escalated-tickets">0</p>
                </div>
            </section>

            <section class="logs-section">
                <h2>Real-Time Telemetry</h2>
                <div id="logs-container" class="glass-panel logs-container">
                    <div class="empty-state">Agent awaiting deployment...</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
